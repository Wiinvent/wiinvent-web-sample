<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner SDK Debug</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      color: white;
      margin-bottom: 20px;
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    
    .main-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .2);
    }
    
    .card h2 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .card h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 20px;
      background: #667eea;
      border-radius: 2px;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: all .2s;
    }
    
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, .1);
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    
    button {
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .5px;
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
    }
    
    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, .4);
    }
    
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    
    .btn-danger {
      background: #ff6b6b;
      color: white;
    }
    
    .btn-danger:hover {
      background: #ee5a52;
    }
    
    .btn-success {
      background: #51cf66;
      color: white;
    }
    
    .btn-success:hover {
      background: #40c057;
    }
    
    .ad-preview {
      width: 100%;
      height: 300px;
      border: 2px dashed #ddd;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      color: #999;
      font-size: 14px;
      transition: all .3s;
      position: relative;
      overflow: hidden;
    }
    
    .ad-preview.active {
      border-color: #667eea;
      background: #f8f9ff;
    }
    
    .video-container {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      height: 400px;
    }
    
    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }
    
    .video-ad-slot {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 780px;
      height: 120px;
      pointer-events: none;
      z-index: 10;
      background: transparent;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .3s;
    }
    
    .video-ad-slot.active {
      pointer-events: auto;
      opacity: 1;
    }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 12px;
    }
    
    .status-badge.ready {
      background: #c8e6c9;
      color: #2e7d32;
    }
    
    .status-badge.loading {
      background: #fff9c4;
      color: #f57f17;
    }
    
    .status-badge.error {
      background: #ffcdd2;
      color: #c62828;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎯 Banner SDK Debug</h1>
  </div>
  <div class="main-grid">
    <div>
      <div class="card" style="margin-bottom: 20px;">
        <h2>Configuration</h2>
        <div class="form-grid">
          <div class="form-group">
            <label>Stream ID</label>
            <input type="text" id="streamId" placeholder="e.g., 123456" value="">
          </div>
          <div class="form-group">
            <label>Channel ID</label>
            <input type="text" id="channelId" placeholder="e.g., 123456" value="">
          </div>
          <div class="form-group">
            <label>Position ID</label>
            <input type="text" id="positionId" placeholder="e.g., HOME_1" value="HOME_1">
          </div>
          <div class="form-group">
            <label>Banner Type</label>
            <select id="bannerType">
              <option value="HOMEPAGE_LARGE_BANNER">HOMEPAGE_LARGE_BANNER</option>
              <option value="SUBPAGE_BANNER">SUBPAGE_BANNER</option>
              <option value="PAUSE_BANNER">PAUSE_BANNER</option>
            </select>
          </div>
        </div>
        <div class="button-group">
          <button class="btn-primary" id="btnInit">Initialize SDK</button>
          <button class="btn-secondary" id="btnTestWelcome">Test Welcome</button>
          <div id="sdkStatus" class="status-badge loading"
               style="display: flex; align-items: center; justify-content: center; flex: 1;">Not initialized
          </div>
        </div>
      </div>
      
      <div class="card" style="margin-bottom: 20px;">
        <h2>Display Banner</h2>
        <div class="ad-preview" id="adPreview">
          <span>Ad will appear here</span>
        </div>
        <div class="button-group" style="margin-top: 16px;">
          <button class="btn-success" id="btnStartDisplay">Start Display</button>
          <button class="btn-danger" id="btnDismissDisplay">Dismiss</button>
        </div>
      </div>
      
      <div class="card">
        <h2>Video with Pause Banner</h2>
        <div class="video-container">
          <video id="videoDemoMain" controls>
            <source src="https://s0.2mdn.net/4253510/google_ddm_animation_480P.mp4" type="video/mp4">
          </video>
          <div class="video-ad-slot" id="videoAdSlot"></div>
        </div>
        <div class="button-group" style="margin-top: 16px;">
          <button class="btn-secondary" id="btnPlayVideo">Play</button>
          <button class="btn-secondary" id="btnPauseVideo">Pause</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://ima-sdk.netlify.app/banner-ima.js"></script>
<!--    <script src="./dist/banner-ima.js"></script>-->
<script>
  'use strict';
  var sdk = null, welcomeSdk = null;
  var statusEl = document.getElementById('sdkStatus');
  var video = document.getElementById('videoDemoMain');
  var videoAdSlot = document.getElementById('videoAdSlot');
  var isSeeking = false, pauseTimeout = null;
  
  function updateStatus(status) {
    statusEl.className = 'status-badge ' + status;
    statusEl.textContent = status === 'ready' ? '✓ SDK Ready' :
      status === 'loading' ? '⏳ Loading...' : '✗ Error';
  }
  
  function attachEvents(sdkInstance) {
    if (!sdkInstance) return;
    var events = ['start', 'loaded', 'rendered', 'skip', 'click', 'dismiss', 'destroy', 'error'];
    events.forEach(function (event) {
      sdkInstance.on(event, function (data) {
        var domId = data && data.domId;
        if (domId === 'adPreview') {
          if (event === 'rendered') {
            document.getElementById('adPreview').classList.add('active');
          } else if (event === 'skip' || event === 'dismiss') {
            document.getElementById('adPreview').classList.remove('active');
          }
        }
        if (domId === 'videoAdSlot') {
          if (event === 'rendered') {
            document.getElementById('videoAdSlot').classList.add('active');
          } else if (event === 'skip' || event === 'dismiss') {
            document.getElementById('videoAdSlot').classList.remove('active');
          }
        }
      });
    });
  }
  
  document.getElementById('btnInit').addEventListener('click', function () {
    var config = {
      streamId: document.getElementById('streamId').value || '',
      channelId: document.getElementById('channelId').value || ''
    };
    try {
      sdk = new AdSDK({
        env: AdSDK.ENV.SANDBOX,
        type: AdSDK.TYPE.DISPLAY,
        debug: true,
        tenantId: 14,
        streamId: config.streamId,
        channelId: config.channelId,
        title: "Banner Debug",
        transId: "debug-" + Date.now(),
        category: "1, 2",
        keyword: "test",
        age: "25",
        gender: AdSDK.GENDER.MALE,
        isUsePartnerSkipButton: true
      });
      
      welcomeSdk = new AdSDK({
        env: AdSDK.ENV.SANDBOX,
        type: AdSDK.TYPE.WELCOME,
        debug: true,
        tenantId: 14,
        streamId: config.streamId,
        channelId: config.channelId,
        title: "Banner Debug",
        transId: "debug-welcome-" + Date.now(),
        category: "1, 2",
        keyword: "test",
        age: "25",
        gender: AdSDK.GENDER.MALE,
        isUsePartnerSkipButton: true
      });
      
      attachEvents(sdk);
      attachEvents(welcomeSdk);
      updateStatus('ready');
    } catch (err) {
      updateStatus('error');
    }
  });
  
  document.getElementById('btnTestWelcome').addEventListener('click', function () {
    if (!welcomeSdk) return;
    welcomeSdk.start(null, null, null, function (result) {
    });
  });
  
  document.getElementById('btnStartDisplay').addEventListener('click', function () {
    if (!sdk) return;
    var positionId = document.getElementById('positionId').value;
    var bannerType = document.getElementById('bannerType').value;
    sdk.start('adPreview', 'DISPLAY', bannerType, positionId, function (result) {
    });
  });
  
  document.getElementById('btnDismissDisplay').addEventListener('click', function () {
    if (!sdk) return;
    sdk.dismiss('adPreview');
  });
  
  document.getElementById('btnPlayVideo').addEventListener('click', function () {
    video.play();
  });
  
  document.getElementById('btnPauseVideo').addEventListener('click', function () {
    video.pause();
  });
  
  video.addEventListener('seeking', function () {
    isSeeking = true;
  });
  video.addEventListener('seeked', function () {
    setTimeout(function () {
      isSeeking = false;
    }, 100);
  });
  
  video.addEventListener('pause', function () {
    if (isSeeking) return;
    clearTimeout(pauseTimeout);
    pauseTimeout = setTimeout(function () {
      if (!video.paused || isSeeking) return;
      if (!sdk) return;
      sdk.start('videoAdSlot', 'OVERLAY', 'PAUSE_BANNER', null, function (result) {
      });
    }, 150);
  });
  
  video.addEventListener('play', function () {
    if (!sdk) return;
    sdk.dismiss('videoAdSlot');
  });
  
  video.addEventListener('ended', function () {
    if (!sdk) return;
    sdk.dismiss('videoAdSlot');
  });
  
  window.addEventListener('message', function (event) {
    if (!event.data || !event.data.type) return;
    var type = event.data.type;
    if (type === 'REPORT_SUBMITTED') {
      console.log('Report submitted', event.data);
    } else if (type === 'REPORT_FAILED') {
      console.log('Report failed', event.data);
    }
  });
</script>
</body>
</html>
